<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>母亲节 · 心之献礼</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        /* 基础背景 — 温柔粉调，作为后备 */
        body {
            min-height: 100vh;
            background: linear-gradient(145deg, #ffe6f0 0%, #ffd9e8 40%, #ffc0d5 100%);
            font-family: 'Segoe UI', 'Quicksand', system-ui, -apple-system, 'Pacifico', cursive, 'PingFang SC', 'Microsoft YaHei', sans-serif;
            overflow-x: hidden;
            position: relative;
        }

        /* ---------- 封面样式 (全屏精美入口) ---------- */
        .mothers-day-cover {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 30% 10%, #fff0f5, #ffdbeb);
            backdrop-filter: blur(3px);
            z-index: 2000;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: opacity 0.8s ease, visibility 0.8s ease;
            box-shadow: 0 0 0 100vw rgba(0,0,0,0.02);
            font-family: 'Segoe UI', 'Quicksand', 'PingFang SC', cursive;
        }

        .cover-card {
            text-align: center;
            background: rgba(255, 245, 245, 0.85);
            backdrop-filter: blur(20px);
            padding: 2rem 2rem 2.5rem;
            border-radius: 68px;
            box-shadow: 0 30px 45px rgba(215, 70, 100, 0.25), 0 0 0 1px rgba(255, 220, 230, 0.8), 0 0 0 8px #ffb7c5;
            width: 85%;
            max-width: 460px;
            animation: gentleRise 0.6s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            transition: transform 0.2s;
        }

        .cover-card:active {
            transform: scale(0.98);
        }

        @keyframes gentleRise {
            from {
                opacity: 0;
                transform: translateY(25px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .cover-heart {
            font-size: 5.8rem;
            filter: drop-shadow(0 8px 12px rgba(255, 80, 100, 0.3));
            animation: softBeat 1.4s infinite ease-in-out;
            display: inline-block;
            margin-bottom: 15px;
        }

        @keyframes softBeat {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.12); text-shadow: 0 0 12px #ff99bb; }
        }

        .cover-title {
            font-size: 2.5rem;
            background: linear-gradient(135deg, #c73f5f, #ff8aa5);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            font-weight: 800;
            letter-spacing: 4px;
            margin: 15px 0 8px;
        }

        .cover-sub {
            font-size: 1.1rem;
            color: #aa5a74;
            margin: 12px 0;
            font-weight: 500;
            border-top: 1px dashed #ffb7c5;
            padding-top: 15px;
            display: inline-block;
        }

        .cover-tip {
            background: #ffecf0;
            border-radius: 40px;
            padding: 8px 20px;
            display: inline-block;
            margin-top: 20px;
            font-size: 0.95rem;
            color: #c43f62;
            font-weight: 600;
            box-shadow: inset 0 1px 2px #ffeef4, 0 4px 8px rgba(0,0,0,0.05);
        }

        .cover-tip span {
            display: inline-block;
            animation: bounceArrow 1.2s infinite;
        }

        @keyframes bounceArrow {
            0%, 100% { transform: translateX(0); }
            50% { transform: translateX(5px); }
        }

        /* 主内容区域 (初始隐藏) */
        .main-content {
            display: none;
            width: 100%;
            min-height: 100vh;
            position: relative;
        }

        /* 原爱心容器 + 所有主要元素位于此处 */
        .heart-container {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
            backdrop-filter: blur(2px);
            border-radius: 60px;
            padding: 20px 20px 35px;
            transition: all 0.3s ease;
        }

        canvas {
            display: block;
            margin: 0 auto;
            width: 100%;
            max-width: 500px;
            height: auto;
            box-shadow: 0 25px 40px rgba(255, 80, 120, 0.25), 0 0 0 8px rgba(255, 245, 240, 0.6), 0 0 0 12px #ffb7c5;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 25%, #fff5f7, #ffe0e8);
            transition: box-shadow 0.2s;
            cursor: pointer;
        }

        canvas:active {
            transform: scale(0.99);
        }

        .message {
            text-align: center;
            margin-top: 30px;
            margin-bottom: 15px;
            background: rgba(255, 245, 245, 0.7);
            backdrop-filter: blur(12px);
            padding: 18px 28px;
            border-radius: 80px;
            box-shadow: 0 10px 20px rgba(255, 80, 120, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.8);
            width: fit-content;
            max-width: 90vw;
        }

        .message h1 {
            font-size: 2.2rem;
            background: linear-gradient(135deg, #d43f6b, #ff8cae, #ff5277);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            letter-spacing: 2px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .message p {
            font-size: 1.18rem;
            color: #a13e5a;
            font-weight: 500;
            margin: 8px 0;
            line-height: 1.4;
        }

        .message .chinese-poem {
            font-family: 'KaiTi', '华文楷书', cursive;
            font-size: 1.2rem;
            color: #c75473;
            border-top: 1px dashed #ffb0c0;
            padding-top: 8px;
            margin-top: 8px;
        }

        /* 漂浮区域 (动态生成爱心) */
        .floating-area {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 999;
            overflow: hidden;
        }

        .float-heart {
            position: absolute;
            bottom: -30px;
            font-size: 24px;
            color: #ff7795;
            text-shadow: 0 0 5px #fff0f3;
            opacity: 0.85;
            pointer-events: none;
            animation: floatUp linear forwards;
            filter: drop-shadow(0 3px 6px rgba(245, 60, 100, 0.2));
        }

        @keyframes floatUp {
            0% {
                transform: translateY(0) rotate(0deg) scale(0.6);
                opacity: 0.9;
            }
            70% {
                opacity: 0.7;
            }
            100% {
                transform: translateY(-110vh) rotate(25deg) scale(1.2);
                opacity: 0;
            }
        }

        /* 静态小装饰 */
        .bg-deco {
            position: fixed;
            bottom: 20px;
            right: 20px;
            font-size: 70px;
            opacity: 0.2;
            pointer-events: none;
            z-index: 0;
            transform: rotate(-10deg);
        }

        .bg-deco-left {
            left: 15px;
            bottom: 30px;
            font-size: 55px;
            opacity: 0.2;
            position: fixed;
            pointer-events: none;
            z-index: 0;
        }

        @media (max-width: 550px) {
            .message h1 {
                font-size: 1.7rem;
            }
            .message p {
                font-size: 0.95rem;
            }
            .message .chinese-poem {
                font-size: 1rem;
            }
            canvas {
                max-width: 320px;
            }
            .cover-title {
                font-size: 1.9rem;
            }
            .cover-heart {
                font-size: 4.2rem;
            }
        }
    </style>
</head>
<body>

    <!-- 封面层：母亲节暖心入口 -->
    <div class="mothers-day-cover" id="welcomeCover">
        <div class="cover-card">
            <div class="cover-heart">💖🌸💖</div>
            <div class="cover-title">母亲节快乐</div>
            <div class="cover-sub">✨ 致 · 最美的妈妈 ✨</div>
            <div style="font-size: 1rem; color:#bc6f8a; margin: 0.6rem 0;">感谢您用爱 温暖了我的四季</div>
            <div class="cover-tip">
                💗 请打开这封信 💗
                <span style="margin-left: 5px;">👉</span>
            </div>
        </div>
    </div>

    <!-- 主要内容区域：所有爱心动画+祝福文字 (初始隐藏) -->
    <div class="main-content" id="mainContent">
        <div class="heart-container">
            <canvas id="motherHeartCanvas" width="500" height="500"></canvas>
            <div class="message">
                <h1>💗 母亲节快乐 💗</h1>
                <p>✨ To mather:✨</p>
				 <p>你首先是你自己，其次才是我的妈妈，对自己好点儿，不要天天对自己省着，该买就买，女人四十一枝花，把自己打扮的漂漂亮亮的，学会自己取悦自己，把自己逗得开开心心的才是最棒哒</p>
                <p>🌷 感谢您无私的爱与呵护 🌷</p>
                <div class="chinese-poem">🏵️ 岁月不败美人，母爱润泽心田 · 愿妈妈永远安康喜乐 🏵️</div>
            </div>
        </div>
        <div class="bg-deco">🌸💖🌸</div>
        <div class="bg-deco-left">🌷👩‍👧🌷</div>
    </div>

    <!-- 漂浮爱心层（动态生成容器，始终存在但动画需要启动后才生成） -->
    <div class="floating-area" id="floatingArea"></div>

    <script>
        (function() {
            // ---------- 获取 DOM 元素 ----------
            const cover = document.getElementById('welcomeCover');
            const mainContent = document.getElementById('mainContent');
            const canvas = document.getElementById('motherHeartCanvas');
            const ctx = canvas.getContext('2d');
            const floatingArea = document.getElementById('floatingArea');
            
            // 全局控制是否已经初始化主界面
            let isMainActive = false;
            let animationId = null;
            let heartIntervalId = null;
            let startTime = null;
            
            // ---------- 心跳爱心绘图相关函数 ----------
            canvas.width = 500;
            canvas.height = 500;
            
            // 心形参数生成点集
            function getHeartPoints(scaleFactor, offsetX, offsetY) {
                const points = [];
                const segments = 120;
                for (let i = 0; i <= segments; i++) {
                    const t = (i / segments) * Math.PI * 2;
                    let xRaw = 16 * Math.pow(Math.sin(t), 3);
                    let yRaw = 13 * Math.cos(t) - 5 * Math.cos(2*t) - 2*Math.cos(3*t) - Math.cos(4*t);
                    xRaw = xRaw * 1.02;
                    yRaw = yRaw * 1.0;
                    const xScaled = xRaw * scaleFactor;
                    const yScaled = yRaw * scaleFactor;
                    points.push({ x: offsetX + xScaled, y: offsetY - yScaled });
                }
                return points;
            }
            
            // 绘制爱心 (包含炫彩渐变 & 光晕)
            function drawHeart(scaleVal) {
                if (!ctx) return;
                ctx.clearRect(0, 0, 500, 500);
                const centerX = 250;
                const centerY = 260;
                const baseSize = 9.6;
                const dynamicSize = baseSize * scaleVal;
                const heartPoints = getHeartPoints(dynamicSize, centerX, centerY);
                if (heartPoints.length < 3) return;
                
                ctx.beginPath();
                ctx.moveTo(heartPoints[0].x, heartPoints[0].y);
                for (let i = 1; i < heartPoints.length; i++) {
                    ctx.lineTo(heartPoints[i].x, heartPoints[i].y);
                }
                ctx.closePath();
                
                const gradient = ctx.createLinearGradient(170, 180, 330, 380);
                gradient.addColorStop(0, '#ff4d6d');
                gradient.addColorStop(0.4, '#ff758f');
                gradient.addColorStop(0.7, '#ff8ca3');
                gradient.addColorStop(1, '#ffb3c6');
                ctx.fillStyle = gradient;
                ctx.fill();
                
                ctx.save();
                ctx.shadowBlur = 18;
                ctx.shadowColor = 'rgba(200, 40, 70, 0.5)';
                ctx.shadowOffsetX = 3;
                ctx.shadowOffsetY = 3;
                ctx.fill();
                ctx.restore();
                
                // 高光层
                ctx.beginPath();
                const highlightPoints = getHeartPoints(dynamicSize * 0.92, centerX - 3, centerY - 4);
                ctx.moveTo(highlightPoints[0].x, highlightPoints[0].y);
                for (let i = 1; i < highlightPoints.length; i++) {
                    ctx.lineTo(highlightPoints[i].x, highlightPoints[i].y);
                }
                ctx.closePath();
                ctx.fillStyle = 'rgba(255, 245, 250, 0.35)';
                ctx.fill();
                
                // 边缘描边
                ctx.beginPath();
                ctx.moveTo(heartPoints[0].x, heartPoints[0].y);
                for (let i = 1; i < heartPoints.length; i++) {
                    ctx.lineTo(heartPoints[i].x, heartPoints[i].y);
                }
                ctx.closePath();
                ctx.strokeStyle = '#ffecf0';
                ctx.lineWidth = 2.5;
                ctx.shadowBlur = 6;
                ctx.shadowColor = '#ff99bb';
                ctx.stroke();
                ctx.shadowBlur = 0;
                
                // 内部星光斑点
                for (let i = 0; i < 24; i++) {
                    const angle = Math.random() * Math.PI * 2;
                    const rad = dynamicSize * (7 + Math.random() * 5);
                    const spotX = centerX + Math.cos(angle) * rad * 0.65;
                    const spotY = centerY - Math.sin(angle) * rad * 0.7 - 5;
                    ctx.beginPath();
                    ctx.arc(spotX, spotY, Math.random() * 2.2 + 1, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(255, 240, 210, ${Math.random() * 0.6 + 0.3})`;
                    ctx.fill();
                }
                // 中央珍珠光
                ctx.beginPath();
                ctx.arc(centerX - 3, centerY - 12, 7, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(255, 220, 230, 0.5)';
                ctx.fill();
                ctx.beginPath();
                ctx.arc(centerX - 5, centerY - 14, 3, 0, Math.PI * 2);
                ctx.fillStyle = '#fff9fc';
                ctx.fill();
            }
            
            // 心跳动画循环
            function animateHeart(timestamp) {
                if (!isMainActive) return; // 封面未开启时不继续动画（安全）
                if (!startTime) startTime = timestamp;
                const elapsed = (timestamp - startTime) / 1000;
                let tMod = (elapsed * 1.6) % (Math.PI * 2);
                let intensity = 0;
                let beat = Math.sin(tMod);
                if (beat > 0.7) {
                    intensity = 0.12 * (beat - 0.7) * 3;
                } else if (beat < -0.5) {
                    intensity = 0.05 * Math.abs(beat + 0.5);
                } else {
                    intensity = 0.02 * Math.sin(tMod * 1.5);
                }
                let scaleFactor = 1 + (0.04 * Math.sin(tMod * 2.2)) + intensity;
                scaleFactor = Math.min(1.13, Math.max(0.96, scaleFactor));
                drawHeart(scaleFactor);
                
                // 动态光晕效果
                if (canvas) {
                    const glow = 0.6 + Math.sin(tMod * 3) * 0.2;
                    canvas.style.boxShadow = `0 20px 35px rgba(255, 80, 120, ${0.2 + intensity * 0.5}), 0 0 0 7px rgba(255, 210, 220, 0.85), 0 0 0 11px #ffa5bb`;
                }
                animationId = requestAnimationFrame(animateHeart);
            }
            
            function startHeartBeat() {
                if (animationId) {
                    cancelAnimationFrame(animationId);
                    animationId = null;
                }
                startTime = null;
                isMainActive = true;
                animationId = requestAnimationFrame(animateHeart);
            }
            
            // ---------- 漂浮爱心系统（仅主界面启动后运行）----------
            const heartSymbols = ['❤️', '💖', '💗', '🌸', '🌷', '💕', '💓', '🌺', '💝', '✨', '🌸', '🌼'];
            
            function createFloatingHeart() {
                if (!isMainActive) return; // 未解锁封面不生成爱心
                if (!floatingArea) return;
                const heartDiv = document.createElement('div');
                heartDiv.classList.add('float-heart');
                let symbol = heartSymbols[Math.floor(Math.random() * heartSymbols.length)];
                if (Math.random() > 0.7) symbol = '🌷💗';
                heartDiv.innerHTML = symbol;
                const size = Math.floor(Math.random() * 30 + 18);
                heartDiv.style.fontSize = size + 'px';
                const leftPos = Math.random() * (window.innerWidth - 60) + 20;
                heartDiv.style.left = leftPos + 'px';
                const duration = Math.random() * 6 + 5;
                heartDiv.style.animationDuration = duration + 's';
                const rotation = Math.random() * 40 - 20;
                heartDiv.style.transform = `rotate(${rotation}deg)`;
                heartDiv.style.opacity = 0.7 + Math.random() * 0.3;
                const pinkArr = ['#ff88aa', '#ff6b8b', '#ff9fbb', '#f7a1c4', '#ffb7c5', '#ffc0d9', '#fd90ae'];
                heartDiv.style.color = pinkArr[Math.floor(Math.random() * pinkArr.length)];
                heartDiv.style.textShadow = '0 0 5px #ffecf0';
                floatingArea.appendChild(heartDiv);
                
                heartDiv.addEventListener('animationend', () => {
                    if (heartDiv && heartDiv.remove) heartDiv.remove();
                });
                setTimeout(() => {
                    if (heartDiv && heartDiv.remove) heartDiv.remove();
                }, duration * 1000 + 500);
            }
            
            // 批量生成开场祝福爱心 (轻轻飘落)
            function generateInitialFloatingHearts(count = 14) {
                for (let i = 0; i < count; i++) {
                    setTimeout(() => {
                        if (isMainActive) createFloatingHeart();
                    }, i * 150);
                }
            }
            
            // 启动漂浮爱心定时器
            function startFloatingHearts() {
                if (heartIntervalId) clearInterval(heartIntervalId);
                heartIntervalId = setInterval(() => {
                    if (!isMainActive) return;
                    const existingHearts = document.querySelectorAll('.float-heart').length;
                    if (existingHearts < 55) {
                        createFloatingHeart();
                        if (Math.random() > 0.65 && existingHearts < 40) {
                            setTimeout(() => { if(isMainActive) createFloatingHeart(); }, 120);
                        }
                    }
                }, 680);
            }
            
            // ---------- 初始化主界面 (打开爱心世界) ----------
            let isInitialized = false; // 避免重复初始化
            
            function activateMainWorld() {
                if (isInitialized) return;
                isInitialized = true;
                
                // 显示主内容区域
                mainContent.style.display = 'block';
                
                // 启动心跳动画(爱心绘制+跳动)
                startHeartBeat();
                
                // 启动漂浮爱心系统
                startFloatingHearts();
                
                // 立刻生成一波浪漫爱心，让气氛鲜活
                setTimeout(() => {
                    if (isMainActive) generateInitialFloatingHearts(18);
                }, 100);
                
                // 额外: 点击canvas依旧保留原来的互动惊喜（增强效果）
                if (canvas) {
                    // 保留原本绑定 (避免重复绑定, 且只绑定一次)
                    // 下面的绑定事件会在第一次激活时添加，但为了避免重复，用once选项或在外部判断；但此处只会调用一次activateMainWorld，所以安全。
                    canvas.addEventListener('click', (e) => {
                        if (!isMainActive) return;
                        for (let i = 0; i < 6; i++) {
                            setTimeout(() => {
                                const bigHeart = document.createElement('div');
                                bigHeart.classList.add('float-heart');
                                bigHeart.innerHTML = '💖💗';
                                bigHeart.style.fontSize = '38px';
                                bigHeart.style.left = (e.clientX - 40 + (Math.random() * 80)) + 'px';
                                bigHeart.style.animationDuration = '4s';
                                bigHeart.style.color = '#ff5277';
                                bigHeart.style.filter = 'drop-shadow(0 0 8px gold)';
                                floatingArea.appendChild(bigHeart);
                                bigHeart.addEventListener('animationend', () => bigHeart.remove());
                                setTimeout(() => bigHeart.remove(), 4500);
                            }, i * 50);
                        }
                        canvas.style.transform = 'scale(0.98)';
                        setTimeout(() => { if(canvas) canvas.style.transform = ''; }, 150);
                    });
                    
                    canvas.addEventListener('touchstart', (e) => {
                        if (!isMainActive) return;
                        e.preventDefault();
                        const rect = canvas.getBoundingClientRect();
                        const touchX = rect.left + rect.width / 2;
                        for (let i = 0; i < 4; i++) {
                            const touchHeart = document.createElement('div');
                            touchHeart.classList.add('float-heart');
                            touchHeart.innerHTML = '🌸💖';
                            touchHeart.style.fontSize = '30px';
                            touchHeart.style.left = (touchX + (Math.random() * 60 - 30)) + 'px';
                            touchHeart.style.animationDuration = '3.8s';
                            floatingArea.appendChild(touchHeart);
                            touchHeart.addEventListener('animationend', () => touchHeart.remove());
                        }
                        canvas.style.transform = 'scale(0.97)';
                        setTimeout(() => { if(canvas) canvas.style.transform = ''; }, 120);
                    });
                }
            }
            
            // ---------- 封面点击事件：优雅过渡进入 ----------
            if (cover) {
                cover.addEventListener('click', (e) => {
                    // 防止误触多次
                    if (!cover.style.opacity || cover.style.opacity !== '0') {
                        // 淡出封面动画
                        cover.style.transition = 'opacity 0.6s ease, visibility 0.6s ease';
                        cover.style.opacity = '0';
                        cover.style.visibility = 'hidden';
                        // 激活爱心的世界
                        activateMainWorld();
                        // 延迟移除封面，让过渡平滑
                        setTimeout(() => {
                            if (cover && cover.parentNode) cover.remove();
                        }, 700);
                    }
                });
            }
            
            // 为保证移动端完美响应，确保触碰封面也能触发
            if (cover) {
                cover.style.cursor = 'pointer';
                // 如果页面加载完成时已经处于激活标志后备
            }
            
            // 页面可见性管理 (只有主界面激活时, 清理定时器节省性能，恢复时重新调整)
            let visibilityIntervalBackup = null;
            document.addEventListener('visibilitychange', function() {
                if (!isMainActive) return;
                if (document.hidden) {
                    if (heartIntervalId) {
                        clearInterval(heartIntervalId);
                        heartIntervalId = null;
                    }
                } else {
                    if (!heartIntervalId && isMainActive) {
                        startFloatingHearts();
                        // 再补几个爱心增加气氛
                        setTimeout(() => { if(isMainActive) generateInitialFloatingHearts(6); }, 300);
                    }
                }
            });
            
            // 主动保障在激活后，动态清理过多爱心（性能优化）
            setInterval(() => {
                if (!isMainActive) return;
                const allHearts = document.querySelectorAll('.float-heart');
                if (allHearts.length > 70) {
                    for (let i = 0; i < 25; i++) {
                        if (allHearts[i] && allHearts[i].remove) allHearts[i].remove();
                    }
                }
            }, 12000);
